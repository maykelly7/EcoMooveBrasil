<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoMoove - Compre sua Moto Elétrica</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/css/home_prods.css">
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">EcoMoove</div>
            <a href="#comprar" class="cta-button">Comprar Agora</a>
        </nav>
    </header>

    <main>
        <div class="container">
            <section class="hero">
                <h1>Motos Elétricas<br>EcoMoove</h1>
                <p>Escolha sua moto elétrica e revolucionize sua mobilidade. Autonomia até 220km!</p>
            </section>

            <section class="moto-selector">
                <div class="moto-preview">
                    <img id="motoImage" class="moto-image" src="../img/moto1.jpeg" alt="EcoMoove 01">
                </div>

                <div class="selector-panel">
                    <h2 class="selector-title">Escolha Sua Moto</h2>
                    
                    <div class="moto-options" id="motoOptions"></div>

                    <a href="#comprar" class="cta-button pulse" id="comprarBtn">
                        <i class="fas fa-shopping-cart"></i> Comprar Selecionada
                    </a>
                </div>
            </section>

            <section class="moto-details" id="motoDetails"></section>

            <section class="buy-section" id="comprar">
                <h2 class="final-price" id="finalPrice">R$ 28.900</h2>
                <a href="#" class="cta-button whatsapp-btn" id="whatsappBtn">
                    <i class="fab fa-whatsapp"></i> Comprar pelo WhatsApp
                </a>
            </section>
        </div>
    </main>

    <script src="../styles/js/home_prods.js"></script>
</body>
</html>
