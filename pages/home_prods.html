<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>scooters à Venda - EcoMoove</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/css/home_prods.css">
</head>

<body>
    <header>
        <nav class="container">
            <div class="logo">EcoMoove</div>
            <a href="#motos" class="cta-button">Contato</a>
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="logo-hero">
                <img src="../img/fundoEscuroSemFndo.png" alt="EcoMoove Logo">
            </div>
            <section class="hero">
                <p>Qualidade garantida! Escolha sua moto e entre em contato pelo WhatsApp</p>
            </section>

            <section class="motos-grid" id="motos">
                <div class="motos-container" id="motosContainer"></div>
            </section>
        </div>
    </main>

    <script src="../styles/js/home_prods.js"></script>
</body>

</html>
